services:
  # Backend Web Service
  - type: web
    name: task-tracker-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: task-tracker-db
          property: connectionString

  # Frontend Web Service (Serving Static Build)
  - type: web
    name: task-tracker-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build
    envVars:
      - key: REACT_APP_API_URL
        value: https://task-tracker-backend-ou89.onrender.com
        # Note: In production, the frontend might need the external URL.
        # If both are on Render, you can often use the .onrender.com URL.

databases:
  - name: task-tracker-db
    databaseName: task_tracker
    user: tracker_user
    plan: free
